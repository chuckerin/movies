name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main # or master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a compatible Node.js version (e.g., 18 or 20)

      - name: Environment Variable
        run: echo "VITE_API_KEY is $vars.VITE_API_KEY "

      - name: Another Env Var
        run: echo "VITE_API_KEY is $env.VITE_API_KEY "

      - name: Another Env Variable
        run: echo "VITE_API_KEY is $secrets.VITE_API_KEY"

      - name: Install dependencies
        run: npm install

      - name: Build application
        env:
          # Access the secret/variable and assign it to an environment variable name
          VITE_API_KEY: ${{ vars.VITE_API_KEY }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist # The folder where your build artifacts are located
